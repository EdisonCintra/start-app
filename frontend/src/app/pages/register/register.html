<div class="min-h-screen flex items-center justify-center bg-background">
  <div class="w-full max-w-sm p-8 rounded-2xl bg-card border border-border shadow-sm">

    <h1 class="text-2xl font-bold text-foreground mb-1">Criar conta</h1>
    <p class="text-sm text-muted-foreground mb-6">Preencha os dados para se cadastrar</p>

    <form (ngSubmit)="onSubmit()" #form="ngForm">

      <div class="mb-4">
        <label class="block text-sm font-medium text-foreground mb-1">Email</label>
        <input
          type="email"
          [(ngModel)]="login"
          name="login"
          required
          placeholder="seu@email.com"
          class="w-full px-3 py-2 rounded-lg border border-border bg-background text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-foreground mb-1">Senha</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full px-3 py-2 rounded-lg border border-border bg-background text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-foreground mb-1">Confirmar senha</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          placeholder="••••••••"
          class="w-full px-3 py-2 rounded-lg border border-border bg-background text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </div>

      <!-- Mensagem de erro (senha não coincide ou email já cadastrado) -->
      @if (errorMessage()) {
        <p class="text-sm text-red-500 mb-4">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full py-2.5 rounded-lg bg-primary text-primary-foreground font-semibold text-sm hover:opacity-90 transition-opacity disabled:opacity-50"
      >
        {{ isLoading() ? 'Cadastrando...' : 'Criar conta' }}
      </button>

    </form>

    <!-- Link para quem já tem conta -->
    <p class="text-sm text-muted-foreground text-center mt-6">
      Já tem uma conta?
      <a routerLink="/login" class="text-primary font-medium hover:underline">Entrar</a>
    </p>

  </div>
</div>
